<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>방송대 글쓰기 기초능력 진단</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <main class="container">
      <div class="topbar">
        <div class="brand"><span class="badge">방송대</span> 글쓰기 기초능력 진단</div>
        <a class="chip-link" href="./admin.html">관리자</a>
      </div>

      <section class="hero">
        <h1>
          방송대 학생들의<br />
          글쓰기 기초능력을 진단합니다
        </h1>
        <p>
          20개의 객관식 문항으로 구성된 진단을 완료하면, 자신의 점수와 문항별 해설을 확인할 수 있습니다.
        </p>
        <div class="btn-row">
          <button class="btn primary" id="joinBtn">동의하고 참여하기</button>
          <a class="btn ghost" href="./diagnostic.html">이어하기</a>
        </div>
      </section>

      <h2 class="section-title">서비스 안내</h2>
      <section class="card">
        <div class="steps">
          <div class="step"><div class="title">1. 로그인 상태에서 참여하기 클릭</div><div class="muted">진단 안내 페이지로 이동</div></div>
          <div class="step"><div class="title">2. 비로그인 상태에서 참여하기 클릭</div><div class="muted">로그인 페이지로 이동 후 참여 가능</div></div>
          <div class="step"><div class="title">3. 이어하기 클릭</div><div class="muted">마지막으로 풀던 문항으로 이동</div></div>
        </div>
      </section>

      <footer>조사 결과는 학생 지원과 연구 목적에만 활용합니다.</footer>
    </main>
    <script src="./font-controls.js"></script>
    <script>
      const joinBtn = document.getElementById("joinBtn");
      joinBtn.addEventListener("click", () => {
        const isLoggedIn = localStorage.getItem("writingDiagLoggedIn") === "true";
        window.location.href = isLoggedIn ? "./project-join.html" : "./login.html?next=project-join";
      });
    </script>
  </body>
</html>
