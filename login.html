<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <main class="container">
      <div class="topbar">
        <div class="breadcrumb">Home &gt; 로그인</div>
      </div>

      <section class="card" style="max-width: 560px; margin: 0 auto">
        <h2>로그인이 필요합니다</h2>
        <p class="muted">학교 홈피 로그인 하지 않은 상태에서 ‘참여하기’를 클릭하면 로그인 페이지로 이동합니다.</p>

        <div class="question">
          <div class="step">
            <div class="title">테스트 로그인</div>
            <div class="muted">실서비스 연동 전까지는 아래 버튼으로 로그인 상태를 시뮬레이션합니다.</div>
          </div>
        </div>

        <div class="nav-row">
          <a class="btn ghost" href="./index.html">홈으로</a>
          <button class="btn primary" id="loginBtn">로그인 후 참여하기</button>
        </div>
      </section>
    </main>

    <script src="./font-controls.js"></script>
    <script>
      const loginBtn = document.getElementById("loginBtn");
      const params = new URLSearchParams(window.location.search);
      const next = params.get("next");
      loginBtn.addEventListener("click", () => {
        localStorage.setItem("writingDiagLoggedIn", "true");
        window.location.href = next === "project-join" ? "./project-join.html" : "./guide.html";
      });
    </script>
  </body>
</html>
