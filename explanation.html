<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문항별 해설</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <main class="container">
      <div class="topbar">
        <div class="breadcrumb">Home &gt; 글쓰기 기초능력 진단 안내 &gt; 글쓰기 기초능력 진단 &gt; 개인배경 조사 &gt; 진단결과 &gt; 문항별 해설</div>
      </div>

      <div class="grid exam">
        <section class="card">
          <h2>문항별 해설 보기</h2>
          <p class="muted">오른쪽 문항표에서 번호를 선택하면 해당 문항의 해설로 이동합니다.</p>

          <div class="question">
            <strong id="qTitle"></strong>
            <p id="qChoices"></p>
            <strong>정답</strong>
            <p id="qAnswer"></p>
            <strong>진단영역</strong>
            <p id="qArea"></p>
            <strong>출제기준</strong>
            <p id="qCriterion"></p>
            <strong>해설</strong>
            <p id="qExplain"></p>
          </div>

          <div class="nav-row">
            <a class="btn ghost" href="./result.html">결과로</a>
            <a class="btn primary" href="./example.html">예제 풀어보기</a>
          </div>
        </section>

        <aside class="question-panel card">
          <h4>번호 · 정답</h4>
          <div class="q-grid" id="qGrid"></div>
        </aside>
      </div>
    </main>
    <script src="./font-controls.js"></script>
    <script src="./exam-data.js"></script>
    <script>
      const qTitle = document.getElementById("qTitle");
      const qChoices = document.getElementById("qChoices");
      const qAnswer = document.getElementById("qAnswer");
      const qArea = document.getElementById("qArea");
      const qCriterion = document.getElementById("qCriterion");
      const qExplain = document.getElementById("qExplain");
      const qGrid = document.getElementById("qGrid");

      qTitle.textContent = `${EXPLANATION_DETAIL.no}. ${EXPLANATION_DETAIL.title}`;
      qChoices.innerHTML = EXPLANATION_DETAIL.choices.join("<br />");
      qAnswer.textContent = EXPLANATION_DETAIL.answer;
      qArea.textContent = EXPLANATION_DETAIL.area;
      qCriterion.textContent = EXPLANATION_DETAIL.criterion;
      qExplain.textContent = EXPLANATION_DETAIL.explanation;

      QUESTION_STATUS.forEach((q) => {
        const el = document.createElement("div");
        el.className = q.no === EXPLANATION_DETAIL.no ? "q-btn active" : "q-btn";
        el.textContent = q.no;
        qGrid.appendChild(el);
      });
    </script>
  </body>
</html>
