<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>글쓰기 기초능력 진단</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <main class="container">
      <div class="topbar">
        <div class="breadcrumb">Home &gt; 글쓰기 기초능력 진단 안내 &gt; 글쓰기 기초능력 진단</div>
        <span class="tag">진행 중</span>
      </div>

      <section class="card">
        <div class="mini-head">
          <strong>방송대 글쓰기 기초능력 진단</strong>
          <div class="tiny">글자크기 가 가 · 남은시간 <strong id="timer">39:00</strong></div>
        </div>

        <div class="grid exam">
          <article>
            <div class="progress-wrap">
              <div class="progress-head"><strong id="progressText">8 / 20 문항</strong><span id="progressPct">40%</span></div>
              <div class="bar"><div class="fill" id="progressFill" style="width: 40%"></div></div>
            </div>
            <p class="muted" id="projectInfo"></p>

            <div class="question">
              <h2 id="questionTitle">문항 2</h2>
              <p class="muted" id="questionPrompt"></p>
              <p id="questionStem"></p>
              <div id="choiceList"></div>
            </div>

            <div class="nav-row">
              <a class="btn ghost" href="./guide.html">이전</a>
              <div class="btn-row" style="margin-top: 0">
                <a class="btn ghost" href="./save.html">저장하기</a>
                <a class="btn primary" href="./profile.html">다음</a>
              </div>
            </div>
          </article>

          <aside class="question-panel card">
            <h4>문항 · 응답</h4>
            <div class="q-grid" id="qGrid"></div>
            <div class="q-state">선택 문항은 파란색으로 표시됩니다.</div>
          </aside>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./font-controls.js"></script>
    <script src="./backend-client.js"></script>
    <script src="./exam-data.js"></script>
    <script>
      const projectInfo = document.getElementById("projectInfo");
      const qGrid = document.getElementById("qGrid");
      const questionTitle = document.getElementById("questionTitle");
      const questionPrompt = document.getElementById("questionPrompt");
      const questionStem = document.getElementById("questionStem");
      const choiceList = document.getElementById("choiceList");
      const progressText = document.getElementById("progressText");
      const progressPct = document.getElementById("progressPct");
      const progressFill = document.getElementById("progressFill");

      let activeQuestions = [...DIAGNOSTIC_QUESTIONS];
      let currentNo = activeQuestions[0]?.no || 1;
      let answeredNos = new Set();
      const selectedChoiceByQuestion = {};

      const findQuestion = (no) => activeQuestions.find((q) => q.no === no) || activeQuestions[0];

      const renderQuestionBody = () => {
        const current = findQuestion(currentNo);
        if (!current) return;
        currentNo = current.no;
        questionTitle.textContent = `문항 ${current.no}`;
        questionPrompt.textContent = current.prompt;
        questionStem.textContent = current.stem;
        choiceList.innerHTML = "";
        const choices = current.project_question_choices
          ? [...current.project_question_choices]
              .sort((a, b) => a.choice_no - b.choice_no)
              .map((c) => c.content)
          : current.choices;

        choices.forEach((choice, idx) => {
          const el = document.createElement("button");
          el.type = "button";
          el.className = "choice";
          if (selectedChoiceByQuestion[current.no] === idx) el.classList.add("selected");
          el.textContent = choice;
          el.addEventListener("click", () => {
            selectedChoiceByQuestion[current.no] = idx;
            answeredNos.add(current.no);
            renderQuestionBody();
            renderQuestionGrid();
          });
          choiceList.appendChild(el);
        });
      };

      const renderQuestionGrid = () => {
        qGrid.innerHTML = "";
        activeQuestions.forEach((q) => {
          const el = document.createElement("button");
          el.type = "button";
          el.className = "q-btn";
          if (answeredNos.has(q.no)) el.classList.add("done");
          if (q.no === currentNo) el.classList.add("active");
          el.textContent = q.no;
          el.addEventListener("click", () => {
            currentNo = q.no;
            answeredNos.add(q.no);
            renderQuestionBody();
            renderQuestionGrid();
          });
          qGrid.appendChild(el);
        });

        const solved = answeredNos.size;
        const total = activeQuestions.length || EXAM_META.totalQuestions;
        const pct = Math.round((solved / total) * 100);
        progressText.textContent = `${solved} / ${total} 문항`;
        progressPct.textContent = `${pct}%`;
        progressFill.style.width = `${pct}%`;
      };

      const initializeProjectQuestions = async () => {
        const params = new URLSearchParams(window.location.search);
        const slug = params.get("project");
        if (!slug || !window.AppBackend) {
          projectInfo.textContent = "기본 진단 세트(20문항)로 진행 중";
          renderQuestionBody();
          renderQuestionGrid();
          return;
        }

        try {
          const project = await window.AppBackend.getProjectBySlug(slug);
          if (!project) {
            projectInfo.textContent = "프로젝트를 찾지 못해 기본 진단 세트로 진행합니다.";
            renderQuestionBody();
            renderQuestionGrid();
            return;
          }
          const projectQuestions = await window.AppBackend.getProjectQuestions(project.id);
          if (projectQuestions.length > 0) {
            activeQuestions = projectQuestions.map((q) => ({
              no: q.question_no,
              prompt: q.prompt,
              stem: q.stem,
              project_question_choices: q.project_question_choices,
              is_active: q.is_active,
              id: q.id,
            }));
            currentNo = activeQuestions[0].no;
          }
          projectInfo.textContent = `프로젝트: ${project.name} (${activeQuestions.length}문항)`;
        } catch (e) {
          projectInfo.textContent = `프로젝트 로드 실패: ${e.message || "기본 세트로 진행"}`;
        }
        renderQuestionBody();
        renderQuestionGrid();
      };

      initializeProjectQuestions();

      const timer = document.getElementById("timer");
      let remain = 39 * 60;
      setInterval(() => {
        if (remain <= 0) return;
        remain -= 1;
        const min = String(Math.floor(remain / 60)).padStart(2, "0");
        const sec = String(remain % 60).padStart(2, "0");
        timer.textContent = `${min}:${sec}`;
      }, 1000);
    </script>
  </body>
</html>
