<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>글쓰기 기초능력 진단 안내</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <main class="container">
      <div class="topbar">
        <div class="breadcrumb">Home &gt; 글쓰기 기초능력 진단 안내</div>
        <a class="chip-link" href="./index.html">처음으로</a>

        </div>

        <div class="nav-row">
          <a class="btn ghost" href="./index.html">이전</a>
          <a class="btn primary" href="./diagnostic.html">시작하기</a>
